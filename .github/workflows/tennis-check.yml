name: Check Tennis Court

on:
  workflow_dispatch:
  schedule:
  - cron: "10 22-23,0-14 * * *"


jobs:
  check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install matching EdgeDriver
        shell: pwsh
        run: |
          $edgeVersion = (Get-Item "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe").VersionInfo.ProductVersion
          Write-Host "Edge version: $edgeVersion"

          $driverDir = Join-Path $env:RUNNER_TEMP "edgedriver"
          New-Item -ItemType Directory -Force -Path $driverDir | Out-Null

          $zipPath = Join-Path $driverDir "edgedriver_win64.zip"
          $url = "https://msedgedriver.microsoft.com/$edgeVersion/edgedriver_win64.zip"
          Write-Host "Download URL: $url"
          
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $driverDir -Force

          echo $driverDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tennis checker
        shell: pwsh
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          
        run: |
          .\src\tennis\bin\katsushika_tennis_holiday.ps1